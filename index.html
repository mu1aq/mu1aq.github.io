<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>0x653o scribble note</title>
    <style>
        body { margin: 0; padding: 0; background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }
        #loading { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; z-index: 9999; background: #000; }
        iframe { border: none; width: 100vw; height: 100vh; display: none; }
    </style>
</head>
<body>
    <div id="loading">INITIALIZING_SESSION...</div>
    <iframe id="content-frame"></iframe>

    <script>
        (async function loadVersion() {
            try {
                // 1. Get the version from data.json
                const response = await fetch('data.json');
                const data = await response.json();
                const version = data.config.active_version || 'v5';
                
                // 2. Set the frame source
                const frame = document.getElementById('content-frame');
                frame.src = 'versions/' + version + '/index.html';

                // 3. When the frame loads, show it and hide the loader
                frame.onload = () => {
                    document.getElementById('loading').style.display = 'none';
                    frame.style.display = 'block';
                    console.log(`[SYSTEM] v${version} deployed successfully.`);
                };

            } catch (err) {
                console.error('[ERROR] Boot failed:', err);
                document.getElementById('loading').innerHTML = "BOOT_ERROR: Check data.json";
            }
        })();
    </script>
</body>
</html>
