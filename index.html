<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>0x653o scribble note</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300&family=Inter:wght@100;200;300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="editorial-body">
    <div class="grain-overlay"></div>
    <div class="ambient-glow"></div>

    <div class="viewport">
        <nav class="nav">
            <div class="nav-brand">0x653o</div>
            <div class="nav-links">
                <div class="lang-toggle">
                    <button id="lang-en" class="lang-btn active">EN</button>
                    <span class="sep">/</span>
                    <button id="lang-ko" class="lang-btn">KO</button>
                </div>
                <a href="https://github.com/0x653o" class="nav-item">GH</a>
                <a id="contact-link" href="#" class="nav-item circle-btn">CONTACT</a>
            </div>
        </nav>

        <main class="content">
            <header class="hero">
                <div class="hero-top reveal">
                    <span id="user-location" class="meta-label">SEOUL / KR</span>
                    <span id="user-role" class="meta-label">PENTEST_RESEARCHER</span>
                    <span id="system-status" class="meta-label">ONLINE_RESEARCHING</span>
                </div>
                <h1 id="hero-name-container" class="hero-title reveal">JunSeo <span class="italic">0x653o</span></h1>
                <p id="hero-subtitle" class="hero-subtitle reveal">Studying the deep architecture of complex systems to discover vulnerabilities where they are least expected.</p>
            </header>

            <div class="editorial-grid">
                <!-- About Section -->
                <section class="grid-section about reveal">
                    <h2 id="label-about" class="grid-label">ABOUT</h2>
                    <p id="about-text" class="about-text"></p>
                    <div id="affiliations-container" class="affiliations-list"></div>
                </section>

                <!-- History Section (New) -->
                <section class="grid-section history-full reveal">
                    <h2 id="label-timeline" class="grid-label">HISTORY</h2>
                    <div id="timeline-container" class="timeline-centered"></div>
                </section>

                <!-- Speaking Section (New) -->
                <section class="grid-section reveal">
                    <h2 id="label-speaking" class="grid-label">SPEAKING</h2>
                    <div id="speaking-container" class="project-table"></div>
                </section>

                <!-- Community Section (New) -->
                <section class="grid-section reveal">
                    <h2 id="label-community" class="grid-label">COMMUNITY</h2>
                    <div id="community-container" class="community-list"></div>
                </section>

                <!-- Project List -->
                <section class="grid-section projects reveal">
                    <h2 id="label-works" class="grid-label">SELECTED_WORKS</h2>
                    <div id="projects-container" class="project-table"></div>
                </section>

                <!-- Tech Stack -->
                <section class="grid-section reveal">
                    <h2 id="label-stack" class="grid-label">TECH_STACK</h2>
                    <div id="skills-container" class="skill-flow"></div>
                </section>

                <!-- Connect Section -->
                <section class="grid-section reveal">
                    <h2 id="label-links" class="grid-label">CONNECT</h2>
                    <div id="links-container" class="skill-flow"></div>
                </section>
            </div>

            <footer class="footer reveal">
                <div class="footer-left">
                    <p id="copyright-text"></p>
                </div>
                <div class="footer-right">
                    <p>FOR_THE_DEEP_DIVE</p>
                </div>
            </footer>
        </main>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
